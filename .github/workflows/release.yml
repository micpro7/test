name: Build Homebridge UXC Bundle

on:
  workflow_dispatch:
    inputs:
      homebridge_version:
        default: "latest"
        required: false
      config_ui_version:
        default: "latest"
        required: false

  schedule:
    - cron: "0 6 * * 1"

  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "config.json"
      - ".github/workflows/build-release.yml"

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build rootfs
        run: |
          set -eux

          docker buildx build \
            --build-arg HOMEBRIDGE_VERSION="${{ inputs.homebridge_version || 'latest' }}" \
            --build-arg CONFIG_UI_VERSION="${{ inputs.config_ui_version || 'latest' }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=tar,dest=rootfs.tar \
            .

      - name: Assemble bundle
        run: |
          set -eux

          mkdir -p bundle/rootfs
          tar -xpf rootfs.tar -C bundle/rootfs
          rm -f rootfs.tar

          cp ./config.json bundle/config.json
          python3 -m json.tool bundle/config.json > /dev/null

          test -x bundle/rootfs/usr/bin/node

          # ==============================
          # FIX: find correct npm root
          # ==============================
          NPM_ROOT=$(node -p "require('child_process').execSync('npm root -g').toString().trim()")

          echo "NPM_ROOT=$NPM_ROOT"

          HB_VER=$(cat "$NPM_ROOT/homebridge/package.json" | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          UI_VER=$(cat "$NPM_ROOT/homebridge-config-ui-x/package.json" | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")

          echo "HB_INSTALLED=$HB_VER" >> "$GITHUB_ENV"
          echo "UI_INSTALLED=$UI_VER" >> "$GITHUB_ENV"

          tar -czf homebridge-arm64.tar.gz -C bundle .

      - name: Sanity check
        run: |
          set -eux
          tar -tzf homebridge-arm64.tar.gz | grep -q config.json
          test -x bundle/rootfs/usr/bin/node

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          make_latest: true
          files: homebridge-arm64.tar.gz
          body: |
            Homebridge UXC build

            - Homebridge: ${{ env.HB_INSTALLED }}
            - UI: ${{ env.UI_INSTALLED }}
            - Node: Alpine default