name: Build Homebridge UXC Bundle

on:
  workflow_dispatch:
    inputs:
      homebridge_version:
        default: "latest"
        required: false
      config_ui_version:
        default: "latest"
        required: false

  schedule:
    - cron: "0 6 * * 1"

  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "config.json"
      - ".github/workflows/build-release.yml"

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      # ==========================================================
      # STEP 1: Build container rootfs (ALL software installed here)
      # ==========================================================
      - name: Build rootfs (Docker)
        run: |
          set -eux

          docker buildx build \
            --build-arg HOMEBRIDGE_VERSION="${{ inputs.homebridge_version || 'latest' }}" \
            --build-arg CONFIG_UI_VERSION="${{ inputs.config_ui_version || 'latest' }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=tar,dest=rootfs.tar \
            .

      # ==========================================================
      # STEP 2: Assemble OCI bundle
      # ==========================================================
      - name: Assemble bundle
        run: |
          set -eux

          mkdir -p bundle/rootfs

          # Extract image filesystem
          tar -xpf rootfs.tar -C bundle/rootfs
          rm -f rootfs.tar

          # Strip unnecessary files
          rm -rf bundle/rootfs/usr/share/man \
                 bundle/rootfs/usr/share/doc \
                 bundle/rootfs/var/cache/apk/* \
                 bundle/rootfs/tmp/*

          # Copy config
          cp ./config.json bundle/config.json

          # Validate config
          python3 -m json.tool bundle/config.json > /dev/null

          # DEBUG: Verify Node location
          find bundle/rootfs -name node

          # Validate runtime exists at /usr/local/bin/node (Alpine/Node image path)
          test -x bundle/rootfs/usr/local/bin/node

          # Create final bundle
          tar -czf homebridge-arm64.tar.gz -C bundle .

      # ==========================================================
      # STEP 3: Minimal sanity check
      # ==========================================================
      - name: Sanity check bundle
        run: |
          set -eux

          tar -tzf homebridge-arm64.tar.gz | grep -q config.json
          tar -tzf homebridge-arm64.tar.gz | grep -q "rootfs/usr/local/bin/node"

          echo "Bundle size:"
          du -sh homebridge-arm64.tar.gz

      # ==========================================================
      # STEP 4: Release
      # ==========================================================
      - name: Determine Release Name
        run: |
          set -eux
          CURRENT_DATE=$(date +'%Y-%m-%d')
          # Extract version from the uncompressed bundle
          if [ -f "bundle/rootfs/usr/local/lib/node_modules/homebridge/package.json" ]; then
            HB_VERSION=$(grep -m 1 '"version"' bundle/rootfs/usr/local/lib/node_modules/homebridge/package.json | awk -F'"' '{print $4}')
          else
            HB_VERSION="${{ inputs.homebridge_version || 'latest' }}"
          fi
          echo "RELEASE_NAME=Homebridge V${HB_VERSION}-${CURRENT_DATE}" >> $GITHUB_ENV

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_NAME }}
          tag_name: latest
          make_latest: true
          files: homebridge-arm64.tar.gz
          body: |
            Homebridge UXC Bundle (Stable Build)

            -----------------------------
            DESIGN NOTES
            -----------------------------
            - Homebridge is installed inside Docker image only
            - No dependency inspection is done on GitHub runner
            - Bundle is purely filesystem-based OCI export

            -----------------------------
            BUILD INFO
            -----------------------------
            Base: Alpine 3.22 (arm64)
            Build system: Docker Buildx
