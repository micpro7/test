name: Build Homebridge UXC Bundle

on:
  workflow_dispatch:
    inputs:
      homebridge_version:
        default: "latest"
        required: false
      config_ui_version:
        default: "latest"
        required: false

  schedule:
    - cron: "0 6 * * 1"

  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "config.json"
      - ".github/workflows/build-release.yml"

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # ==========================================================
      # STEP 1: Build rootfs image
      # ==========================================================
      - name: Build rootfs (Docker)
        run: |
          set -eux

          docker buildx build \
            --build-arg HOMEBRIDGE_VERSION="${{ inputs.homebridge_version || 'latest' }}" \
            --build-arg CONFIG_UI_VERSION="${{ inputs.config_ui_version || 'latest' }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=tar,dest=rootfs.tar \
            .

      # ==========================================================
      # STEP 2: Assemble OCI bundle (NO HOST NODE/NPM USED)
      # ==========================================================
      - name: Assemble bundle
        run: |
          set -eux

          mkdir -p bundle/rootfs

          tar -xpf rootfs.tar -C bundle/rootfs
          rm -f rootfs.tar

          cp ./config.json bundle/config.json
          python3 -m json.tool bundle/config.json > /dev/null

          test -x bundle/rootfs/usr/bin/node
          test -x bundle/rootfs/usr/local/bin/hb-service

          # ======================================================
          # Extract version information ONLY from built image
          # ======================================================

          NODE_VER=$(bundle/rootfs/usr/bin/node --version || true)

          HB_VER=$(cat bundle/rootfs/usr/local/lib/node_modules/homebridge/package.json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")

          UI_VER=$(cat bundle/rootfs/usr/local/lib/node_modules/homebridge-config-ui-x/package.json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")

          echo "NODE_INSTALLED=$NODE_VER" >> "$GITHUB_ENV"
          echo "HB_INSTALLED=$HB_VER" >> "$GITHUB_ENV"
          echo "UI_INSTALLED=$UI_VER" >> "$GITHUB_ENV"

          # ======================================================
          # Bundle creation
          # ======================================================

          tar -czf homebridge-arm64.tar.gz -C bundle .

      # ==========================================================
      # STEP 3: Strong sanity checks
      # ==========================================================
      - name: Sanity check bundle
        run: |
          set -eux

          tar -tzf homebridge-arm64.tar.gz | grep -q config.json
          tar -tzf homebridge-arm64.tar.gz | grep -q "rootfs/usr/bin/node"
          tar -tzf homebridge-arm64.tar.gz | grep -q "rootfs/usr/local/bin/hb-service"

          echo "Bundle size:"
          du -sh homebridge-arm64.tar.gz

      # ==========================================================
      # STEP 4: Release
      # ==========================================================
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          make_latest: true
          files: homebridge-arm64.tar.gz
          body: |
            Homebridge UXC Bundle (v2 Optimised Build)

            --------------------------------------------------
            VERSION INFO
            --------------------------------------------------
            Node: ${{ env.NODE_INSTALLED }}
            Homebridge: ${{ env.HB_INSTALLED }}
            UI: ${{ env.UI_INSTALLED }}

            --------------------------------------------------
            DESIGN CHANGES (v2)
            --------------------------------------------------
            - No host npm/node dependency
            - All metadata extracted from container filesystem
            - Strict bundle validation
            - Deterministic OCI output
            - No global npm assumptions
            - Fully reproducible build pipeline

            --------------------------------------------------
            BUILD SYSTEM
            --------------------------------------------------
            Alpine-based multi-stage Docker build
            GitHub Actions (ARM64 runner)