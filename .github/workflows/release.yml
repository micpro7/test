name: Build Homebridge UXC Bundle

on:
  workflow_dispatch:
    inputs:
      homebridge_version:
        default: "latest"
        required: false
      config_ui_version:
        default: "latest"
        required: false

  schedule:
    - cron: "0 6 * * 1"

  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "config.json"
      - ".github/workflows/build-release.yml"

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build rootfs
        run: |
          set -eux

          docker buildx build \
            --build-arg HOMEBRIDGE_VERSION="${{ inputs.homebridge_version || 'latest' }}" \
            --build-arg CONFIG_UI_VERSION="${{ inputs.config_ui_version || 'latest' }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=tar,dest=rootfs.tar \
            .

      - name: Assemble bundle
        run: |
          set -eux

          mkdir -p bundle/rootfs
          tar -xpf rootfs.tar -C bundle/rootfs
          rm -f rootfs.tar

          cp config.json bundle/config.json

          python3 -m json.tool bundle/config.json >/dev/null

          # Basic sanity checks
          test -x bundle/rootfs/usr/bin/node

          # Create bundle
          tar -czf homebridge-arm64.tar.gz -C bundle .

      - name: Verify bundle
        run: |
          set -eux

          tar -tzf homebridge-arm64.tar.gz | grep -q config.json
          tar -tzf homebridge-arm64.tar.gz | grep -q rootfs/usr/bin/node

          du -sh homebridge-arm64.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          make_latest: true
          files: homebridge-arm64.tar.gz
          body: |
            Homebridge UXC Bundle

            Automated build for OpenWrt UXC.

            Base: Alpine 3.22