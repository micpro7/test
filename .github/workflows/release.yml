name: Build Homebridge UXC Bundle

on:
  workflow_dispatch:
    inputs:
      homebridge_version:
        description: "homebridge npm version/tag (e.g. latest, 2.0.2)"
        default: "latest"
        required: false
      config_ui_version:
        description: "homebridge-config-ui-x npm version/tag"
        default: "latest"
        required: false

  schedule:
    - cron: "0 6 * * 1"

  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "config.json"
      - ".github/workflows/build-release.yml"

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build rootfs (Alpine + Node + Homebridge)
        id: build
        env:
          HOMEBRIDGE_VERSION: ${{ inputs.homebridge_version || 'latest' }}
          CONFIG_UI_VERSION: ${{ inputs.config_ui_version || 'latest' }}
        run: |
          set -eux

          docker buildx build \
            --build-arg HOMEBRIDGE_VERSION="${HOMEBRIDGE_VERSION}" \
            --build-arg CONFIG_UI_VERSION="${CONFIG_UI_VERSION}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=tar,dest="${GITHUB_WORKSPACE}/rootfs.tar" \
            .

      - name: Assemble OCI bundle
        run: |
          set -eux

          mkdir -p bundle/rootfs
          tar -xpf rootfs.tar -C bundle/rootfs
          rm -f rootfs.tar

          # IMPORTANT: config.json must be repo root
          cp ./config.json bundle/config.json

          # Validate JSON only (no assumptions about runtime files)
          python3 -m json.tool bundle/config.json > /dev/null

          # Validate runtime existence (safe checks only)
          test -x bundle/rootfs/usr/bin/node

          # Find installed versions safely via file search (NOT require())
          HB_INSTALLED=$(grep -R "homebridge" -n bundle/rootfs/usr/lib/node_modules/homebridge/package.json | head -1 >/dev/null 2>&1 || true)
          UI_INSTALLED=$(grep -R "homebridge-config-ui-x" -n bundle/rootfs/usr/lib/node_modules/homebridge-config-ui-x/package.json | head -1 >/dev/null 2>&1 || true)

          # Proper version extraction (SAFE)
          HB_VER=$(cat bundle/rootfs/usr/lib/node_modules/homebridge/package.json | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")
          UI_VER=$(cat bundle/rootfs/usr/lib/node_modules/homebridge-config-ui-x/package.json | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")

          echo "HB_INSTALLED=$HB_VER" >> "$GITHUB_ENV"
          echo "UI_INSTALLED=$UI_VER" >> "$GITHUB_ENV"

          tar -czf homebridge-arm64.tar.gz -C bundle .

      - name: Sanity-check bundle
        run: |
          set -eux
          tar -tzf homebridge-arm64.tar.gz | grep -q "config.json"
          test -f bundle/config.json
          test -d bundle/rootfs
          test -x bundle/rootfs/usr/bin/node

      - name: Publish / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          make_latest: true
          name: "Homebridge UXC bundle (arm64)"
          body: |
            Automated OpenWrt UXC bundle build.

            - Homebridge: ${{ env.HB_INSTALLED }}
            - Homebridge UI: ${{ env.UI_INSTALLED }}
            - Base: Alpine 3.22 (arm64)
            - Node: system package (Alpine)

            Source: ${{ github.sha }}
          files: homebridge-arm64.tar.gz