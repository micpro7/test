name: Build and Release Homebridge UXC Bundle

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch Homebridge Version
        id: version
        run: |
          HB_VERSION=$(npm show homebridge version)
          RELEASE_TAG="v${HB_VERSION}"
          echo "HB_VERSION=${HB_VERSION}" >> $GITHUB_ENV
          echo "RELEASE_TAG=${RELEASE_TAG}" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Export Rootfs (linux/arm64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t homebridge-uxc-arm64:latest .

          docker create --name temp_container homebridge-uxc-arm64:latest
          mkdir -p bundle/rootfs
          
          # USE SUDO to preserve the original 0:0 container ownership
          docker export temp_container > rootfs.tar
          sudo tar -xf rootfs.tar -C bundle/rootfs/
          docker rm temp_container
          rm rootfs.tar

      - name: Finalize OCI Bundle
        run: |
          sudo cp config.json bundle/
          
          # Compress as root to permanently lock in the permissions
          cd bundle && sudo tar -czf ../homebridge-arm64.tar.gz .
          
          # Hand ownership of the archive back to the runner for the upload step
          sudo chown $USER:$USER ../homebridge-arm64.tar.gz

      - name: Publish Versioned Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "Homebridge ${{ env.RELEASE_TAG }}"
          files: homebridge-arm64.tar.gz
          make_latest: true
