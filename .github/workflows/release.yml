name: Build Homebridge UXC Bundle

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "config.json"
      - ".github/workflows/build-release.yml"

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # ==========================================================
      # Build rootfs
      # ==========================================================
      - name: Build rootfs (Docker)
        run: |
          set -eux

          docker buildx build \
            --build-arg HOMEBRIDGE_VERSION="latest" \
            --build-arg CONFIG_UI_VERSION="latest" \
            --build-arg NODE_VERSION="current-alpine" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=tar,dest=rootfs.tar \
            .

      # ==========================================================
      # Assemble OCI bundle
      # ==========================================================
      - name: Assemble bundle
        run: |
          set -eux

          mkdir -p bundle/rootfs

          tar -xpf rootfs.tar -C bundle/rootfs
          rm -f rootfs.tar

          cp ./config.json bundle/config.json

          python3 -m json.tool bundle/config.json > /dev/null

          test -x bundle/rootfs/usr/local/bin/node

          tar -czf homebridge-arm64.tar.gz -C bundle .

      # ==========================================================
      # Sanity check
      # ==========================================================
      - name: Sanity check bundle
        run: |
          set -eux

          tar -tzf homebridge-arm64.tar.gz | grep -q config.json
          tar -tzf homebridge-arm64.tar.gz | grep -q node

          du -sh homebridge-arm64.tar.gz

      # ==========================================================
      # Release
      # ==========================================================
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          make_latest: true
          files: homebridge-arm64.tar.gz