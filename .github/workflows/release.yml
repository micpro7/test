name: Build Homebridge UXC Bundle

on:
  workflow_dispatch:
    inputs:
      homebridge_version:
        default: "latest"
        required: false
      config_ui_version:
        default: "latest"
        required: false

  schedule:
    - cron: "0 6 * * 1"

  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "config.json"
      - ".github/workflows/build-release.yml"

permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      # ==========================================================
      # STEP 1: Build container rootfs (ALL software installed here)
      # ==========================================================
      - name: Build rootfs (Docker)
        run: |
          set -eux

          docker buildx build \
            --build-arg HOMEBRIDGE_VERSION="${{ inputs.homebridge_version || 'latest' }}" \
            --build-arg CONFIG_UI_VERSION="${{ inputs.config_ui_version || 'latest' }}" \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=tar,dest=rootfs.tar \
            .

      # ==========================================================
      # STEP 2: Assemble OCI bundle
      #
      # IMPORTANT DESIGN RULE:
      # - We NEVER query npm/node_modules on the runner anymore
      # - Everything must come from inside the Docker image output
      # ==========================================================
      - name: Assemble bundle
        run: |
          set -eux

          mkdir -p bundle/rootfs

          # Extract image filesystem
          tar -xpf rootfs.tar -C bundle/rootfs
          rm -f rootfs.tar

          # Copy config (must exist in repo root)
          cp ./config.json bundle/config.json

          # Validate config only (safe check)
          python3 -m json.tool bundle/config.json > /dev/null

          # Validate runtime exists
          test -x bundle/rootfs/usr/bin/node

          # ======================================================
          # NOTE:
          # We intentionally DO NOT read:
          #   - npm root -g
          #   - /usr/local/lib/node_modules
          #   - require() from runner
          #
          # Reason:
          # Those paths exist ONLY inside container runtime,
          # NOT on GitHub Actions host.
          # ======================================================

          # Create final bundle
          tar -czf homebridge-arm64.tar.gz -C bundle .

      # ==========================================================
      # STEP 3: Minimal sanity check only
      # (no dependency inspection)
      # ==========================================================
      - name: Sanity check bundle
        run: |
          set -eux

          tar -tzf homebridge-arm64.tar.gz | grep -q config.json
          tar -tzf homebridge-arm64.tar.gz | grep -q "rootfs/usr/bin/node"

          echo "Bundle size:"
          du -sh homebridge-arm64.tar.gz

      # ==========================================================
      # STEP 4: Release
      # ==========================================================
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          make_latest: true
          files: homebridge-arm64.tar.gz
          body: |
            Homebridge UXC Bundle (Stable Build)

            -----------------------------
            DESIGN NOTES (IMPORTANT)
            -----------------------------
            - Homebridge is installed inside Docker image only
            - No dependency inspection is done on GitHub runner
            - No npm/global path assumptions are used
            - Bundle is purely filesystem-based OCI export

            -----------------------------
            BUILD INFO
            -----------------------------
            Base: Alpine 3.22 (arm64)
            Build system: Docker Buildx