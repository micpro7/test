name: Build Homebridge UXC Bundle

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build rootfs
        run: |
          set -eux
          docker buildx build \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --output type=tar,dest=rootfs.tar \
            .

      - name: Assemble bundle
        run: |
          set -eux

          mkdir -p bundle/rootfs
          tar -xpf rootfs.tar -C bundle/rootfs

          cp config.json bundle/config.json
          python3 -m json.tool bundle/config.json

          test -x bundle/rootfs/usr/bin/node
          test -x bundle/rootfs/usr/local/bin/hb-service

          NODE_VER=$(bundle/rootfs/usr/bin/node --version)

          HB_VER=$(cat bundle/rootfs/usr/local/lib/node_modules/homebridge/package.json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")

          UI_VER=$(cat bundle/rootfs/usr/local/lib/node_modules/homebridge-config-ui-x/package.json \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['version'])")

          echo "NODE=$NODE_VER" >> $GITHUB_ENV
          echo "HB=$HB_VER" >> $GITHUB_ENV
          echo "UI=$UI_VER" >> $GITHUB_ENV

          tar -czf homebridge-arm64.tar.gz -C bundle .

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          make_latest: true
          files: homebridge-arm64.tar.gz
          body: |
            Homebridge UXC v3

            Node: ${{ env.NODE }}
            Homebridge: ${{ env.HB }}
            UI: ${{ env.UI }}

            - Official Node.js 24 LTS runtime
            - Minimal Alpine runtime
            - Aggressive cleanup
            - Reduced memory overhead